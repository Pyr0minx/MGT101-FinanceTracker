<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    </head>
    <body id="login-screen">
      <header id="title-display">Placeholder</header>
      <div>
        <form action="dashboard.html" method="GET" id="login">
          <input type="email" placeholder="email" required>
          <input type="password" placeholder="password" required>
          <div id="eula-row" style="font-size: 0.85rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="eula-agree" required>
            <label for="eula-agree">I have read and agree to the <a href="EULA.html" target="_blank">EULA</a></label>
          </div>
          <button type="submit" id="login-btn">Login</button>
        </form>
      </div>
    </body>
</html>
