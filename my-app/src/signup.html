<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="signup.js" defer></script>
    <link rel="stylesheet" href="signUp.css">
    <title>Create Account</title>
</head>
<div id="notification"></div>
<body>

    <div class="background"></div>

    <form id="signupForm" action="action_page.php" style="border:1px solid #ccc">
        <div class="container">

            <div class="create">
                <h1>Create Account</h1>
            </div>

            <div class="bottomText">
                <b>John personal finance: the app</b>
            </div>

            <div class="topText">
                <p>Build up your savings, saves time! No minimums required!</p>
            </div>

            <div class="nameText">
                <label for="firstName"><b>First Name</b></label>
                <label for="lastName"><b>Last Name</b></label>
            </div>

            <div class="FullName">
                <input type="text" id="firstName" name="Fname" placeholder="First name" required>

                <input type="text" id="lastName" name="Lname" placeholder="Last name" required>
            </div>

            <div class="Username">
                <label for="username"><b>Username</b></label>
                <input type="text" id="username" name="username" placeholder="Enter username" required>
            </div>

            <div class="Email">
                <label for="email"><b>Email</b></label>
                <input type="text" id="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="Age">
                <label for="dob"><b>Date of Birth</b></label>
                <input type="date" id="dob" name="age">
            </div>

            <div class="Password">
                <label for="password"><b>Password</b></label>
                <input type="password" id="password" name="psw" placeholder="Enter Password" required>

                <label for="confirmPassword"><b>Confirm Password</b></label>
                <input type="password" id="confirmPassword" name="psw-repeat" placeholder="Repeat Password" required>
            </div>

            <div class="remember">
                <label>
                    <input type="checkbox" id="remember" name="remember" checked>
                    Remember me
                </label>
            </div>

            <p>
                By creating an account you agree to our
                <a href="#" style="color:dodgerblue">Terms and Service</a>
            </p>

            <div class="clearfix">
                <button type="button" class="cancelbtn">Cancel</button>
                <button type="submit" class="signupbtn">Sign Up</button>
            </div>

        </div>
    </form>

</body>

<footer>
</footer>

</html>
